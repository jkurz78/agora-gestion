# deploy.yml — CI & Deploy unifié (prod + démo)
#
# Triggered on every push to main.
# Runs prod and demo deployments SEQUENTIALLY in a single job, sharing the
# cPanel SSH whitelist setup and cleanup. This avoids the race condition that
# happened when two parallel workflows tried to whitelist their respective
# runner IPs simultaneously (both calling SshWhitelist/remove_all then add).
#
# Sequence:
#   test → setup firewall (whitelist runner IP) → deploy prod → deploy demo
#        → cleanup firewall (always: unwhitelist + restore home IP)
#
# If prod deploy fails, demo deploy is skipped (default GHA step behaviour).
# Cleanup steps always run to restore the firewall to its baseline state.
#
# PRE-REQUISITES (server-side, must be met for demo deploy to succeed):
#   - ~/public_html/demo.agoragestion.org/ is a git clone of this repo
#   - .env is present with APP_ENV=demo and a dedicated MySQL DB
#   - database/demo/snapshot.yaml is committed in main
#
# Same secrets as before (no new secrets to add):
#   CPANEL_USERNAME, CPANEL_API_TOKEN, CPANEL_SERVER, SSH_KEY, HOME_SSH_HOST

name: CI & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ghostscript
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Allow ImageMagick to read PDFs
        run: |
          sudo sed -i 's|<policy domain="coder" rights="none" pattern="PDF" />|<policy domain="coder" rights="read\|write" pattern="PDF" />|' /etc/ImageMagick-6/policy.xml || true

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, mbstring, xml, dom, curl, zip, intl, bcmath, imagick
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test --no-ansi

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      # ─── Setup: whitelist runner IP on cPanel firewall ────────────────────

      - name: Get runner public IP
        id: ip
        run: |
          for attempt in 1 2 3; do
            for svc in "https://api.ipify.org" "https://ifconfig.me/ip" "https://icanhazip.com"; do
              IP=$(curl -sf --max-time 10 "$svc" 2>/dev/null | tr -d '[:space:]')
              if [[ "$IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "ipv4=$IP" >> "$GITHUB_OUTPUT"
                echo "Got IP $IP from $svc (attempt $attempt)"
                exit 0
              fi
            done
            echo "Attempt $attempt failed, waiting 30s..."
            sleep 30
          done
          echo "Failed to get public IP after 3 attempts"
          exit 1

      - name: Remove all whitelisted IPs
        run: |
          curl -sm 45 \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove_all"

      - name: Whitelist runner IP
        run: |
          curl -sm 45 \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=${{ steps.ip.outputs.ipv4 }}&port=22"

      - name: Verify IP is whitelisted
        run: |
          curl -sm 45 \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/list" \
            | grep "${{ steps.ip.outputs.ipv4 }}"

      - name: Wait for firewall to apply
        run: sleep 60

      - name: Test SSH connectivity
        run: |
          for i in 1 2 3 4 5; do
            if nc -z -w 5 ${{ secrets.CPANEL_SERVER }} 22 2>/dev/null; then
              echo "SSH port reachable on attempt $i"
              exit 0
            fi
            echo "Attempt $i: SSH port not yet reachable, waiting 15s..."
            sleep 15
          done
          echo "SSH port still not reachable after 5 attempts"
          exit 1

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 0400 ~/.ssh/id_ed25519

      # ─── Deploy prod ──────────────────────────────────────────────────────

      - name: Deploy prod
        id: deploy_prod
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }} \
            "bash ~/bin/deploy.sh"

      - name: Tail deploy.log on prod failure
        if: failure() && steps.deploy_prod.outcome == 'failure'
        run: |
          echo "=== Dernières 100 lignes de deploy.log (prod) ==="
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }} \
            'LOG=$(find ~/public_html -maxdepth 4 -name deploy.log -printf "%T@ %p\n" 2>/dev/null | sort -rn | head -1 | cut -d" " -f2); if [ -n "$LOG" ]; then echo "Fichier: $LOG"; tail -n 100 "$LOG"; else echo "Aucun deploy.log trouvé sous ~/public_html"; fi' \
            || echo "Impossible d'exécuter le tail distant"

      # ─── Deploy démo (only if prod deploy succeeded) ──────────────────────

      - name: Deploy démo
        id: deploy_demo
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }} \
            'set -e
             DEMO_PATH=~/public_html/demo.agoragestion.org
             cd "$DEMO_PATH"
             grep -q '"'"'^APP_ENV=demo$'"'"' .env || { echo "REFUS — APP_ENV n'\''est pas demo dans .env"; exit 1; }
             realpath . | grep -q '"'"'demo.agoragestion.org'"'"' || { echo "REFUS — mauvais répertoire ($(realpath .))"; exit 1; }
             echo "[deploy-demo] pre-flight OK"
             echo "[deploy-demo] git fetch + reset to origin/main"
             git fetch origin main
             git reset --hard origin/main
             echo "[deploy-demo] composer install"
             composer install --no-dev --optimize-autoloader --no-interaction
             echo "[deploy-demo] artisan cache"
             php artisan config:cache
             php artisan route:cache
             php artisan view:cache
             echo "[deploy-demo] migrate:fresh"
             php artisan migrate:fresh --force
             echo "[deploy-demo] demo:reset"
             php artisan demo:reset --snapshot=database/demo/snapshot.yaml
             echo "[deploy-demo] up"
             php artisan up
             echo "[deploy-demo] done"'

      - name: Tail demo-reset.log on demo failure
        if: failure() && steps.deploy_demo.outcome == 'failure'
        run: |
          echo "=== Dernières 100 lignes de demo-reset.log ==="
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }} \
            'LOG=~/public_html/demo.agoragestion.org/storage/logs/demo-reset.log; if [ -f "$LOG" ]; then echo "Fichier: $LOG"; tail -n 100 "$LOG"; else echo "Aucun demo-reset.log trouvé"; fi' \
            || echo "Impossible d'exécuter le tail distant"

      # ─── Cleanup (always run, even on prior failures) ─────────────────────

      - name: Clean up SSH key
        if: always()
        run: rm -rf ~/.ssh

      - name: Restore whitelist (remove runner IP, restore home IP)
        if: always()
        run: |
          curl -sm 45 \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove_all"
          curl -sm 45 \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=${{ secrets.HOME_SSH_HOST }}&port=22"
